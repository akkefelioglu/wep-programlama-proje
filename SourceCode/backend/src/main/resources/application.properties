# ============================
# BritMart E-Commerce Backend
# Spring Boot Application Properties
# ============================

# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Başlangıç verileri
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Stripe
stripe.api.key=sk_test_demo_key_replace_with_real

# Firebase
firebase.credentials.path=classpath:firebase-service-account.json

# CORS
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.britmart.ecommerce=DEBUG
